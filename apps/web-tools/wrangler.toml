name = "web-tools"
compatibility_date = "2026-03-25"

routes = [
  { pattern = "web-tools.ossm.rs", custom_domain = true },
]

[assets]
directory = "dist"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
