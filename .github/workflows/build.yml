name: Build

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: Upload firmware binaries as artifacts
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  ESPFLASH_VERSION: "4.3.0"
  WASM_PACK_VERSION: "0.14.0"
  ESP_TOOLCHAIN_VERSION: "1.94.0.2"

jobs:
  build-esp:
    name: Build ${{ matrix.firmware }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        firmware: [ossm-alt, waveshare]
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          ldproxy: false
          version: ${{ env.ESP_TOOLCHAIN_VERSION }}

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v2

      - name: Build ${{ matrix.firmware }}
        run: just build-${{ matrix.firmware }}

      - name: Install espflash
        run: |
          curl -L https://github.com/esp-rs/espflash/releases/download/v${ESPFLASH_VERSION}/espflash-x86_64-unknown-linux-gnu.zip -o espflash.zip
          unzip espflash.zip
          chmod +x espflash
          sudo mv espflash /usr/local/bin/

      - name: Validate firmware binary
        run: espflash save-image --chip esp32s3 --partition-table firmware/${{ matrix.firmware }}/partitions.csv target/xtensa-esp32s3-none-elf/release/${{ matrix.firmware }} ${{ matrix.firmware }}.bin

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.firmware }}
          path: ${{ matrix.firmware }}.bin

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: |
          curl -L https://github.com/wasm-bindgen/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz -o wasm-pack.tar.gz
          tar xzf wasm-pack.tar.gz
          sudo mv wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/

      - name: Build WASM
        run: wasm-pack build firmware/sim-wasm --target web

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          version: ${{ env.ESP_TOOLCHAIN_VERSION }}

      - name: Export ESP environment
        shell: pwsh
        run: |
          Get-Content "$env:USERPROFILE/exports" | ForEach-Object {
            if ($_ -match '\$Env:PATH\s*=\s*"([^"]+)"') {
              $path = $matches[1] -replace '\s*\+\s*\$Env:PATH', '' -replace '"', '' -replace ';$', ''
              $path >> $env:GITHUB_PATH
            }
            elseif ($_ -match '\$Env:(\w+)\s*=\s*"([^"]+)"') {
              $name = $matches[1]
              $value = $matches[2]
              "$name=$value" >> $env:GITHUB_ENV
            }
          }

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v2

      - name: Install wasm-pack
        shell: bash
        run: |
          curl -L https://github.com/wasm-bindgen/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-pc-windows-msvc.tar.gz -o wasm-pack.tar.gz
          tar xzf wasm-pack.tar.gz
          mv wasm-pack-v${WASM_PACK_VERSION}-x86_64-pc-windows-msvc/wasm-pack.exe "$HOME/.cargo/bin/"

      - name: Build all
        run: just build-all
