name: Build

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out (defaults to the triggering event ref)
        type: string
        default: ''
      upload-artifacts:
        description: Upload firmware binaries as artifacts
        type: boolean
        default: false
      release-id:
        description: Release identifier baked into the firmware image (e.g. tag or PR number)
        type: string
        default: dev

env:
  CARGO_TERM_COLOR: always
  ESPFLASH_VERSION: "4.3.0"
  ESP_TOOLCHAIN_VERSION: "1.94.0.2"

jobs:
  build-esp:
    name: Build ${{ matrix.firmware }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        firmware: [ossm-alt, waveshare, seeed-xiao, ossm-reference]
        include:
          - firmware: ossm-alt
            chip: esp32s3
            target: xtensa-esp32s3-none-elf
          - firmware: waveshare
            chip: esp32s3
            target: xtensa-esp32s3-none-elf
          - firmware: seeed-xiao
            chip: esp32s3
            target: xtensa-esp32s3-none-elf
          - firmware: ossm-reference
            chip: esp32
            target: xtensa-esp32-none-elf
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          ldproxy: false
          version: ${{ env.ESP_TOOLCHAIN_VERSION }}

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v2

      - name: Build ${{ matrix.firmware }}
        run: just build-${{ matrix.firmware }}
        env:
          OSSM_RELEASE_ID: ${{ inputs.release-id }}

      - name: Install espflash
        run: |
          curl -L https://github.com/esp-rs/espflash/releases/download/v${ESPFLASH_VERSION}/espflash-x86_64-unknown-linux-gnu.zip -o espflash.zip
          unzip espflash.zip
          chmod +x espflash
          sudo mv espflash /usr/local/bin/

      - name: Validate firmware binary
        run: espflash save-image --merge --chip ${{ matrix.chip }} --partition-table firmware/${{ matrix.firmware }}/partitions.csv firmware/${{ matrix.firmware }}/target/${{ matrix.target }}/release/${{ matrix.firmware }} ${{ matrix.firmware }}.bin

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.firmware }}
          path: ${{ matrix.firmware }}.bin

  build-webtools:
    name: Build Web Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Install binaryen
        run: sudo apt-get install -y binaryen

      - uses: extractions/setup-just@v2

      - name: Build WASM
        run: just build-wasm
        env:
          OSSM_RELEASE_ID: ${{ inputs.release-id }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version-file: apps/web-tools/.nvmrc
          cache: pnpm
          cache-dependency-path: apps/web-tools/pnpm-lock.yaml

      - run: pnpm install
        working-directory: apps/web-tools
      - run: pnpm run build
        working-directory: apps/web-tools

      - name: Upload web tools artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-tools
          path: apps/web-tools/dist
