name: Cleanup Web Tools Preview

on:
  pull_request_target:
    types: [closed]

jobs:
  cleanup:
    name: Cleanup PR Preview
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Deactivate GitHub deployment
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ github.token }}
          environment: "Preview (PR #${{ github.event.pull_request.number }})"
          onlyDeactivateDeployments: true

      - name: Delete PR firmware from R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR=${{ github.event.pull_request.number }}
          for board in ossm-alt waveshare seeed-xiao; do
            npx wrangler@4 r2 object delete --remote "ossm-firmware/pr-${PR}/${board}.bin" 2>/dev/null || true
          done
