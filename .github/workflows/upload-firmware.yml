name: Upload Firmware

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out (defaults to the triggering event ref)
        type: string
        default: ''
      pr-number:
        description: PR number (empty for push-to-main builds)
        type: string
        default: ''
      run-id:
        description: Workflow run ID to download artifacts from (defaults to current run)
        type: string
        default: ''

jobs:
  upload:
    name: Upload firmware to R2
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || '' }}

      - name: Determine context
        id: ctx
        env:
          HAS_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN && 'true' || 'false' }}
        run: |
          echo "has-secrets=$HAS_SECRETS" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.pr-number }}" ]; then
            echo "pr-number=${{ inputs.pr-number }}" >> "$GITHUB_OUTPUT"
            echo "is-pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-bins
          run-id: ${{ inputs.run-id && inputs.run-id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Discover boards
        id: boards
        run: |
          boards=""
          for dir in firmware-bins/*/; do
            board=$(basename "$dir")
            [ -f "firmware-bins/${board}/${board}.bin" ] || continue
            boards="${boards:+$boards }$board"
          done
          echo "list=$boards" >> "$GITHUB_OUTPUT"

      - name: Read content hashes
        run: |
          for board in ${{ steps.boards.outputs.list }}; do
            cp "firmware-bins/${board}/${board}.sha256" "firmware-bins/${board}.sha256"
          done

      - name: Upload firmware to R2 (PR)
        if: steps.ctx.outputs.is-pr == 'true' && steps.ctx.outputs.has-secrets == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR=${{ steps.ctx.outputs.pr-number }}
          for board in ${{ steps.boards.outputs.list }}; do
            npx wrangler@4 r2 object put --remote "ossm-firmware/pr-${PR}/${board}.bin" --file "firmware-bins/${board}/${board}.bin"
          done

      - name: Upload SHA256 hashes to R2 (main)
        if: steps.ctx.outputs.is-pr == 'false' && steps.ctx.outputs.has-secrets == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for board in ${{ steps.boards.outputs.list }}; do
            npx wrangler@4 r2 object put --remote "ossm-firmware/main/${board}.sha256" --file "firmware-bins/${board}.sha256"
          done

      - name: Check if behind main
        if: steps.ctx.outputs.is-pr == 'true' && steps.ctx.outputs.has-secrets == 'true'
        id: behind
        run: |
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR comment
        if: steps.ctx.outputs.is-pr == 'true' && steps.ctx.outputs.has-secrets == 'true'
        id: comment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR=${{ steps.ctx.outputs.pr-number }}
          BEHIND="${{ steps.behind.outputs.behind }}"
          PREVIEW_URL="https://pr-${PR}-web-tools.ossm-rs.workers.dev"

          {
            echo "body<<COMMENT_EOF"
            echo "## Firmware"
            echo ""
            echo "Built firmware binaries for this PR. Click a link below to open the web flasher with the selected board pre-loaded - just connect your device and hit flash. Status is compared against the latest main build."
            echo ""

            if [ "$BEHIND" = "true" ]; then
              echo "> [!WARNING]"
              echo "> This branch is behind main - change detection may be inaccurate."
              echo ""
            fi

            echo "| Board | Status | |"
            echo "|-------|--------|-|"

            for board in ${{ steps.boards.outputs.list }}; do
              pr_hash=$(cat "firmware-bins/${board}/${board}.sha256")
              main_hash=$(npx wrangler@4 r2 object get --remote "ossm-firmware/main/${board}.sha256" --pipe 2>/dev/null) || main_hash="none"

              if [ -z "$main_hash" ] || [ "$main_hash" = "none" ]; then
                status=":new: New"
              elif [ "$pr_hash" = "$main_hash" ]; then
                status=":white_check_mark: Unchanged"
              else
                status=":warning: Changed"
              fi

              echo "| \`${board}\` | ${status} | [Open](${PREVIEW_URL}/firmware/pr/${PR}/${board}) |"
            done

            echo ""
            echo "<sub>Deployed on $(date -u +'%b %d, %Y at %H:%M UTC')</sub>"
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.ctx.outputs.is-pr == 'true' && steps.ctx.outputs.has-secrets == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: firmware-builds
          number: ${{ steps.ctx.outputs.pr-number }}
          message: ${{ steps.comment.outputs.body }}
