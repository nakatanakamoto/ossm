name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  commits:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: webiny/action-conventional-commits@v1.3.0
        with:
          GITHUB_TOKEN: ${{ github.token }}

  build:
    uses: ./.github/workflows/build.yml
    with:
      upload-artifacts: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
      release-id: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }}

  build-windows:
    uses: ./.github/workflows/build-windows.yml

  deploy-webtools:
    needs: [build]
    if: always() && needs.build.result == 'success'
    uses: ./.github/workflows/deploy-webtools.yml
    with:
      pr-number: ${{ github.event_name == 'pull_request' && format('{0}', github.event.pull_request.number) || '' }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    secrets: inherit

  upload-firmware:
    needs: [build]
    if: always() && needs.build.result == 'success'
    uses: ./.github/workflows/upload-firmware.yml
    with:
      pr-number: ${{ github.event_name == 'pull_request' && format('{0}', github.event.pull_request.number) || '' }}
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit
