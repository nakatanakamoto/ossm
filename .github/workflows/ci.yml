name: CI

on:
  pull_request:
  push:
    branches: [main]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-comment:
    name: Check /build command
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      triggered: ${{ steps.check.outputs.triggered }}
      ref: ${{ steps.pr-ref.outputs.ref }}
      pr-number: ${{ steps.check.outputs.pr-number }}
    steps:
      - name: Validate command
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          IS_PR="${{ github.event.issue.pull_request && 'true' || 'false' }}"
          ASSOC="${{ github.event.comment.author_association }}"
          TRIMMED=$(echo "$COMMENT_BODY" | head -1 | xargs)

          if [[ "$IS_PR" == "true" && "$TRIMMED" == "/build" && "$ASSOC" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
            echo "triggered=true" >> "$GITHUB_OUTPUT"
            echo "pr-number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR head ref
        if: steps.check.outputs.triggered == 'true'
        id: pr-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF=$(gh pr view ${{ steps.check.outputs.pr-number }} --repo ${{ github.repository }} --json headRefOid -q .headRefOid)
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: React to comment
        if: steps.check.outputs.triggered == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='+1' --silent

  commits:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: webiny/action-conventional-commits@v1.3.0
        with:
          GITHUB_TOKEN: ${{ github.token }}

  build:
    needs: [check-comment]
    if: |
      always() && (
        github.event_name != 'issue_comment' ||
        needs.check-comment.outputs.triggered == 'true'
      )
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.check-comment.outputs.ref || '' }}
      upload-artifacts: ${{ github.event_name == 'pull_request' || github.event_name == 'issue_comment' || github.ref == 'refs/heads/main' }}
      release-id: >-
        ${{
          github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) ||
          github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) ||
          'main'
        }}

  build-windows:
    needs: [check-comment]
    if: |
      always() && (
        github.event_name != 'issue_comment' ||
        needs.check-comment.outputs.triggered == 'true'
      )
    uses: ./.github/workflows/build-windows.yml
    with:
      ref: ${{ needs.check-comment.outputs.ref || '' }}

  upload-firmware:
    name: Upload firmware to R2
    needs: [build, check-comment]
    if: |
      always() &&
      needs.build.result == 'success' && (
        github.event_name == 'pull_request' ||
        github.ref == 'refs/heads/main' ||
        needs.check-comment.outputs.triggered == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.check-comment.outputs.ref || '' }}

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "is-pr=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ needs.check-comment.outputs.pr-number }}" >> "$GITHUB_OUTPUT"
            echo "is-pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-bins

      - name: Discover boards
        id: boards
        run: |
          boards=""
          for dir in firmware-bins/*/; do
            board=$(basename "$dir")
            boards="${boards:+$boards }$board"
          done
          echo "list=$boards" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 hashes
        run: |
          for board in ${{ steps.boards.outputs.list }}; do
            hash=$(sha256sum "firmware-bins/${board}/${board}.bin" | cut -d' ' -f1)
            echo "$hash" > "firmware-bins/${board}.sha256"
          done

      - name: Upload firmware to R2 (PR)
        if: steps.pr.outputs.is-pr == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          for board in ${{ steps.boards.outputs.list }}; do
            npx wrangler@4 r2 object put --remote "ossm-firmware/pr-${PR}/${board}.bin" --file "firmware-bins/${board}/${board}.bin"
          done

      - name: Upload SHA256 hashes to R2 (main)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for board in ${{ steps.boards.outputs.list }}; do
            npx wrangler@4 r2 object put --remote "ossm-firmware/main/${board}.sha256" --file "firmware-bins/${board}.sha256"
          done

      - name: Check if behind main
        if: steps.pr.outputs.is-pr == 'true'
        id: behind
        run: |
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR comment
        if: steps.pr.outputs.is-pr == 'true'
        id: comment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          BEHIND="${{ steps.behind.outputs.behind }}"
          PREVIEW_URL="https://pr-${PR}-web-tools.ossm-rs.workers.dev"

          {
            echo "body<<COMMENT_EOF"
            echo "## Firmware"
            echo ""
            echo "Built firmware binaries for this PR. Click a link below to open the web flasher with the selected board pre-loaded - just connect your device and hit flash. Status is compared against the latest main build."
            echo ""

            if [ "$BEHIND" = "true" ]; then
              echo "> [!WARNING]"
              echo "> This branch is behind main - change detection may be inaccurate."
              echo ""
            fi

            echo "| Board | Status | |"
            echo "|-------|--------|-|"

            for board in ${{ steps.boards.outputs.list }}; do
              pr_hash=$(sha256sum "firmware-bins/${board}/${board}.bin" | cut -d' ' -f1)
              main_hash=$(npx wrangler@4 r2 object get --remote "ossm-firmware/main/${board}.sha256" --pipe 2>/dev/null) || main_hash="none"

              if [ -z "$main_hash" ] || [ "$main_hash" = "none" ]; then
                status=":new: New"
              elif [ "$pr_hash" = "$main_hash" ]; then
                status=":white_check_mark: Unchanged"
              else
                status=":warning: Changed"
              fi

              echo "| \`${board}\` | ${status} | [Open](${PREVIEW_URL}/firmware/pr/${PR}/${board}) |"
            done

            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.pr.outputs.is-pr == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: firmware-builds
          number: ${{ steps.pr.outputs.number }}
          message: ${{ steps.comment.outputs.body }}
