name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  commits:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: webiny/action-conventional-commits@v1.3.0
        with:
          GITHUB_TOKEN: ${{ github.token }}

  build:
    uses: ./.github/workflows/build.yml
    with:
      upload-artifacts: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
      release-id: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }}

  build-windows:
    uses: ./.github/workflows/build-windows.yml

  upload-firmware:
    name: Upload firmware to R2
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-bins

      - name: Discover boards
        id: boards
        run: |
          boards=""
          for dir in firmware-bins/*/; do
            board=$(basename "$dir")
            boards="${boards:+$boards }$board"
          done
          echo "list=$boards" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 hashes
        run: |
          for board in ${{ steps.boards.outputs.list }}; do
            hash=$(sha256sum "firmware-bins/${board}/${board}.bin" | cut -d' ' -f1)
            echo "$hash" > "firmware-bins/${board}.sha256"
          done

      - name: Upload firmware to R2 (PR)
        if: github.event_name == 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR=${{ github.event.pull_request.number }}
          for board in ${{ steps.boards.outputs.list }}; do
            npx wrangler@4 r2 object put --remote "ossm-firmware/pr-${PR}/${board}.bin" --file "firmware-bins/${board}/${board}.bin"
          done

      - name: Upload SHA256 hashes to R2 (main)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for board in ${{ steps.boards.outputs.list }}; do
            npx wrangler@4 r2 object put --remote "ossm-firmware/main/${board}.sha256" --file "firmware-bins/${board}.sha256"
          done

      - name: Check if behind main
        if: github.event_name == 'pull_request'
        id: behind
        run: |
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR comment
        if: github.event_name == 'pull_request'
        id: comment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR=${{ github.event.pull_request.number }}
          BEHIND="${{ steps.behind.outputs.behind }}"
          PREVIEW_URL="https://pr-${PR}-web-tools.ossm-rs.workers.dev"

          {
            echo "body<<COMMENT_EOF"
            echo "## Firmware"
            echo ""
            echo "Built firmware binaries for this PR. Click a link below to open the web flasher with the selected board pre-loaded - just connect your device and hit flash. Status is compared against the latest main build."
            echo ""

            if [ "$BEHIND" = "true" ]; then
              echo "> [!WARNING]"
              echo "> This branch is behind main - change detection may be inaccurate."
              echo ""
            fi

            echo "| Board | Status | |"
            echo "|-------|--------|-|"

            for board in ${{ steps.boards.outputs.list }}; do
              pr_hash=$(sha256sum "firmware-bins/${board}/${board}.bin" | cut -d' ' -f1)
              main_hash=$(npx wrangler@4 r2 object get --remote "ossm-firmware/main/${board}.sha256" --pipe 2>/dev/null) || main_hash="none"

              if [ -z "$main_hash" ] || [ "$main_hash" = "none" ]; then
                status=":new: New"
              elif [ "$pr_hash" = "$main_hash" ]; then
                status=":white_check_mark: Unchanged"
              else
                status=":warning: Changed"
              fi

              echo "| \`${board}\` | ${status} | [Open](${PREVIEW_URL}/firmware/pr/${PR}/${board}) |"
            done

            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: firmware-builds
          message: ${{ steps.comment.outputs.body }}
