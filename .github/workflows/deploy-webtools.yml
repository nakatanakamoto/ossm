name: Deploy Web Tools

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  WASM_PACK_VERSION: "0.14.0"

jobs:
  build:
    name: Build Web Tools
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: |
          curl -L https://github.com/wasm-bindgen/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz -o wasm-pack.tar.gz
          tar xzf wasm-pack.tar.gz
          sudo mv wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/

      - name: Build WASM
        run: wasm-pack build firmware/sim-wasm --target web

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version-file: apps/web-tools/.nvmrc
          cache: pnpm
          cache-dependency-path: apps/web-tools/pnpm-lock.yaml

      - run: pnpm install
        working-directory: apps/web-tools
      - run: pnpm run build
        working-directory: apps/web-tools

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: web-tools-dist
          path: apps/web-tools/dist

  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version-file: apps/web-tools/.nvmrc

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: web-tools-dist
          path: apps/web-tools/dist

      - name: Create GitHub deployment
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: Production
          environment-url: https://web-tools.ossm.rs

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
          workingDirectory: apps/web-tools

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          state: success
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment-url: https://web-tools.ossm.rs

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          state: failure
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
